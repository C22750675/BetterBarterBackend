services:
  db:
    image: postgis/postgis:16-3.4-alpine
    
    container_name: betterbarter-db
    
    # Docker Compose will automatically read values from the .env file
    # in the same directory
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      
    # Map the container's port 5432 to the host machine's port 5432
    ports:
      - "5432:5432"
      
    # Define a volume to persist the database data
    volumes:
      - ./data/postgis:/var/lib/postgresql/data
      
    # Set a restart policy to ensure the database container starts automatically
    # if it crashes or if Docker is restarted
    restart: unless-stopped